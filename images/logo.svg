<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Logo Mark - Brain + Circuit hybrid -->
  <g transform="translate(20, 20)">
    <!-- Outer circle -->
    <circle cx="40" cy="40" r="38" fill="#1a365d" stroke="#2563eb" stroke-width="2"/>
    
    <!-- Brain/Circuit lines -->
    <path d="M40 15 C25 15, 15 28, 15 40 C15 52, 25 65, 40 65 C55 65, 65 52, 65 40 C65 28, 55 15, 40 15" 
          stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Neural nodes -->
    <circle cx="40" cy="25" r="4" fill="#f59e0b"/>
    <circle cx="28" cy="35" r="3" fill="#60a5fa"/>
    <circle cx="52" cy="35" r="3" fill="#60a5fa"/>
    <circle cx="25" cy="48" r="3" fill="#60a5fa"/>
    <circle cx="55" cy="48" r="3" fill="#60a5fa"/>
    <circle cx="40" cy="55" r="4" fill="#f59e0b"/>
    
    <!-- Connections -->
    <line x1="40" y1="29" x2="28" y2="35" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="40" y1="29" x2="52" y2="35" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="28" y1="35" x2="25" y2="48" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="52" y1="35" x2="55" y2="48" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="25" y1="48" x2="40" y2="55" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="55" y1="48" x2="40" y2="55" stroke="#60a5fa" stroke-width="1.5"/>
    
    <!-- Gear element (manufacturing nod) -->
    <circle cx="40" cy="40" r="12" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>
  
  <!-- Wordmark -->
  <text x="110" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1a365d">
    Sialkot
  </text>
  <text x="205" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2563eb">
    AI
  </text>
  <text x="245" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1a365d">
    Masters
  </text>
  
  <!-- Tagline -->
  <text x="110" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.5">
    AI SOLUTIONS FOR PAKISTANI BUSINESSES
  </text>
</svg>