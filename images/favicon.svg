<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Favicon / Icon Only Version -->
  <rect width="80" height="80" rx="16" fill="#1a365d"/>
  
  <!-- Brain/Circuit -->
  <path d="M40 18 C28 18, 20 28, 20 40 C20 52, 28 62, 40 62 C52 62, 60 52, 60 40 C60 28, 52 18, 40 18" 
        stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Neural nodes -->
  <circle cx="40" cy="28" r="5" fill="#f59e0b"/>
  <circle cx="30" cy="38" r="4" fill="#60a5fa"/>
  <circle cx="50" cy="38" r="4" fill="#60a5fa"/>
  <circle cx="28" cy="50" r="4" fill="#60a5fa"/>
  <circle cx="52" cy="50" r="4" fill="#60a5fa"/>
  <circle cx="40" cy="56" r="5" fill="#f59e0b"/>
  
  <!-- Connections -->
  <line x1="40" y1="33" x2="30" y2="38" stroke="#60a5fa" stroke-width="2"/>
  <line x1="40" y1="33" x2="50" y2="38" stroke="#60a5fa" stroke-width="2"/>
  <line x1="30" y1="38" x2="28" y2="50" stroke="#60a5fa" stroke-width="2"/>
  <line x1="50" y1="38" x2="52" y2="50" stroke="#60a5fa" stroke-width="2"/>
  <line x1="28" y1="50" x2="40" y2="56" stroke="#60a5fa" stroke-width="2"/>
  <line x1="52" y1="50" x2="40" y2="56" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- Gear ring -->
  <circle cx="40" cy="40" r="14" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 4"/>
</svg>