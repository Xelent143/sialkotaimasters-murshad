<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- White version for dark backgrounds -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Mark -->
  <g transform="translate(20, 20)">
    <circle cx="40" cy="40" r="38" fill="url(#logoGradient)" stroke="#60a5fa" stroke-width="2"/>
    
    <path d="M40 15 C25 15, 15 28, 15 40 C15 52, 25 65, 40 65 C55 65, 65 52, 65 40 C65 28, 55 15, 40 15" 
          stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    
    <circle cx="40" cy="25" r="4" fill="#fbbf24"/>
    <circle cx="28" cy="35" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="52" cy="35" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="25" cy="48" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="55" cy="48" r="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="40" cy="55" r="4" fill="#fbbf24"/>
    
    <line x1="40" y1="29" x2="28" y2="35" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="29" x2="52" y2="35" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="28" y1="35" x2="25" y2="48" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="52" y1="35" x2="55" y2="48" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="25" y1="48" x2="40" y2="55" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="55" y1="48" x2="40" y2="55" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    
    <circle cx="40" cy="40" r="12" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>
  
  <!-- Wordmark - White for dark bg -->
  <text x="110" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
    Sialkot
  </text>
  <text x="205" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#60a5fa">
    AI
  </text>
  <text x="245" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
    Masters
  </text>
  
  <text x="110" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#94a3b8" letter-spacing="0.5">
    AI SOLUTIONS FOR PAKISTANI BUSINESSES
  </text>
</svg>